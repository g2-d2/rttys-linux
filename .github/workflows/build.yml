name: Build RPM

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install tools
        run: sudo apt-get install rpm -y

      - name: Setup rpmbuild
        run: |
          mkdir -p ~/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          cp rttys-linux.spec ~/rpmbuild/SPECS/

          tar czf rttys-linux-1.0.tar.gz app rttys.service
          mv rttys-linux-1.0.tar.gz ~/rpmbuild/SOURCES/

      - name: Build RPM
        run: rpmbuild -ba ~/rpmbuild/SPECS/rttys-linux.spec

      - name: Upload Release
        uses: softprops/action-gh-release@v1
        with:
          files: ~/rpmbuild/RPMS/noarch/*.rpm

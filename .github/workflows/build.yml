name: Build RPM

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Setup rpmbuild
        run: |
          mkdir -p ~/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          cp rttys-linux.spec ~/rpmbuild/SPECS/

          mkdir rttys-linux-1.0
          cp -r app rttys-linux-1.0/
          cp rttys.service rttys-linux-1.0/

          tar czf rttys-linux-1.0.tar.gz rttys-linux-1.0
          mv rttys-linux-1.0.tar.gz ~/rpmbuild/SOURCES/

      - name: Build RPM
        run: rpmbuild -ba ~/rpmbuild/SPECS/rttys-linux.spec

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ~/rpmbuild/RPMS/noarch/*.rpm
``
